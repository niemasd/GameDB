<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GameDB Viewer</title>
  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #000000;
      --table-bg: #f2f2f2;
      --border-color: #ddd;
      --input-bg: #ffffff;
      --muted-color: #666;
      --ok-color: #1a7f37;
      --warn-color: #b26a00;
    }

    body.dark {
      --bg-color: #1e1e1e;
      --text-color: #eeeeee;
      --table-bg: #333333;
      --border-color: #555555;
      --input-bg: #2a2a2a;
      --muted-color: #aaa;
      --ok-color: #3fb950;
      --warn-color: #d29922;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: Arial, sans-serif;
      padding: 20px;
      transition: background-color 0.3s, color 0.3s;
    }

    #controls {
      text-align: center;
      margin-bottom: 20px;
    }

    #headerRow {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    #modeToggle, #downloadBtn {
      padding: 6px 10px;
      cursor: pointer;
      font-size: 14px;
    }

    #subtitleRow {
      margin-top: 6px;
    }

    #statusRow {
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted-color);
      min-height: 18px;
    }

    #statusRow.ok { color: var(--ok-color); }
    #statusRow.warn { color: var(--warn-color); }

    select, input {
      margin: 10px 5px;
      padding: 5px;
      background-color: var(--input-bg);
      color: var(--text-color);
      border: 1px solid var(--border-color);
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 10px;
      font-family: monospace;
    }

    th, td {
      border: 1px solid var(--border-color);
      padding: 8px;
      font-family: monospace;
    }

    th {
      cursor: pointer;
      background-color: var(--table-bg);
      user-select: none;
    }

    th.sorted-asc::after { content: " ▲"; }
    th.sorted-desc::after { content: " ▼"; }

    a:link {
      color: #0066cc;
      text-decoration: underline;
    }

    a:visited {
      color: #800080;
    }

    a:hover {
      color: #3399ff;
    }

    a:active {
      color: #ff6600;
    }

    /* Subtle divider line under controls */
    #controls hr {
      border: none;
      border-top: 1px solid var(--border-color);
      margin: 12px auto 0 auto;
      max-width: 900px;
    }
  </style>
</head>
<body>
  <div id="controls">
    <div id="headerRow">
      <h1 style="margin: 0;">GameDB Viewer</h1>
      <button id="modeToggle">🌙 Dark Mode</button>
    </div>

    <div id="subtitleRow">
      <a id="githubLink" target="_blank" rel="noopener">Loading...</a>
    </div>

    <div id="actionRow" style="margin-top: 10px;">
      <select id="consoleSelector">
        <option value="">Select a Console</option>
      </select>
      <button id="downloadBtn" disabled title="Download the TSV from GitHub Releases, then choose it from your downloads">
        ⬇️ Download & Load TSV
      </button>
      <input type="text" id="searchBox" placeholder="Search..." style="width: 300px;">
    </div>

    <div id="statusRow"></div>
    <hr>
  </div>

  <div id="tableContainer"></div>

  <!-- Hidden file picker (browser requires explicit user selection to read downloaded files) -->
  <input id="filePicker" type="file" accept=".tsv,.data.tsv,text/tab-separated-values" style="display:none;">

  <script>
    const GITHUB_USERNAME = 'niemasd';
    const GAMEDB_URL = `https://github.com/${GITHUB_USERNAME}/GameDB`;

    // dynamically update the GitHub link
    const githubLink = document.getElementById('githubLink');
    githubLink.href = GAMEDB_URL;
    githubLink.textContent = GAMEDB_URL;

    const db = new Map();
    const consoleMap = new Map(); // map CONSOLE_NAME -> { url, abbrev }
    let sortState = { index: null, direction: null };
    let currentAbbrev = null;
    let currentReleaseUrl = null;
    let currentConsoleName = null;

    // parse query string
    const urlParams = new URLSearchParams(window.location.search);
    const preselectedAbbrev = urlParams.get('console');

    function setStatus(msg, kind = '') {
      const el = document.getElementById('statusRow');
      el.classList.remove('ok', 'warn');
      if (kind) el.classList.add(kind);
      el.textContent = msg || '';
    }

    function expectedFilenameForAbbrev(abbrev) {
      return `${abbrev}.data.tsv`;
    }

    async function loadMarkdown() {
      const readmeUrl = `https://raw.githubusercontent.com/${GITHUB_USERNAME}/GameDB/main/README.md`;
      const res = await fetch(readmeUrl);
      const md = await res.text();
      const lines = md.split('\n');
      const regex = new RegExp(`^\\* \\*\\*(.+?):\\*\\* https://github\\.com/${GITHUB_USERNAME}/GameDB-(\\w+)`);

      for (const line of lines) {
        const match = line.match(regex);
        if (match) {
          const consoleName = match[1];
          const abbrev = match[2];
          const url = `https://github.com/${GITHUB_USERNAME}/GameDB-${abbrev}`;
          db.set(consoleName, null);
          consoleMap.set(consoleName, { url, abbrev });
          addOption(consoleName);
        }
      }

      // if a console was specified in the URL, select it
      if (preselectedAbbrev) {
        const matchEntry = Array.from(consoleMap.entries()).find(
          ([, meta]) => meta.abbrev.toLowerCase() === preselectedAbbrev.toLowerCase()
        );
        if (matchEntry) {
          const consoleName = matchEntry[0];
          document.getElementById('consoleSelector').value = consoleName;
          document.getElementById('consoleSelector').dispatchEvent(new Event('change'));
        }
      }
    }

    function addOption(consoleName) {
      const selector = document.getElementById('consoleSelector');
      const option = document.createElement('option');
      option.value = consoleName;
      option.textContent = consoleName;
      selector.appendChild(option);
    }

    function renderTable(data) {
      const container = document.getElementById('tableContainer');
      container.innerHTML = '';
      if (!data || !Array.isArray(data) || data.length === 0) return;

      const table = document.createElement('table');
      const thead = document.createElement('thead');
      const tbody = document.createElement('tbody');

      const headers = data[0];
      const idIndex = headers.indexOf('ID');

      const headerRow = document.createElement('tr');
      headers.forEach((header, idx) => {
        const th = document.createElement('th');
        th.textContent = header;

        th.addEventListener('click', () => {
          const isSameColumn = sortState.index === idx;
          const ascending = !isSameColumn || sortState.direction === 'desc';

          sortState = {
            index: idx,
            direction: ascending ? 'asc' : 'desc'
          };

          const sortedRows = data.slice(1).slice().sort((a, b) => {
            const aVal = a[idx] || '';
            const bVal = b[idx] || '';
            return ascending ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
          });

          const sortedData = [headers, ...sortedRows];
          renderTable(sortedData);
        });

        headerRow.appendChild(th);
      });

      thead.appendChild(headerRow);
      table.appendChild(thead);

      const renderBody = (filteredData) => {
        tbody.innerHTML = '';
        filteredData.slice(1).forEach(row => {
          const tr = document.createElement('tr');
          row.forEach((cell, colIdx) => {
            const td = document.createElement('td');

            if (colIdx === idIndex && cell) {
              const a = document.createElement('a');
              a.href = `https://github.com/${GITHUB_USERNAME}/GameDB-${currentAbbrev}/tree/main/games/` + encodeURIComponent(`${cell}`);
              a.target = '_blank';
              a.rel = 'noopener';
              a.textContent = cell;
              td.appendChild(a);
            } else {
              td.textContent = cell;
            }

            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        });
      };

      renderBody(data);

      document.getElementById('searchBox').oninput = function () {
        const query = this.value.toLowerCase();
        const filtered = [data[0], ...data.slice(1).filter(row =>
          row.some(cell => (cell || '').toLowerCase().includes(query))
        )];
        renderBody(filtered);
      };

      table.appendChild(tbody);
      container.appendChild(table);

      thead.querySelectorAll('th').forEach((th, i) => {
        th.classList.remove('sorted-asc', 'sorted-desc');
        if (sortState.index === i) {
          th.classList.add(sortState.direction === 'asc' ? 'sorted-asc' : 'sorted-desc');
        }
      });

      // sort by first column automatically
      if (sortState.index === null) {
        table.querySelectorAll('th')[0].click();
      }
    }

    function resetToInitialState() {
      githubLink.href = GAMEDB_URL;
      githubLink.textContent = GAMEDB_URL;
      currentAbbrev = null;
      currentReleaseUrl = null;
      currentConsoleName = null;
      document.getElementById('downloadBtn').disabled = true;
      document.getElementById('searchBox').value = '';
      renderTable([]);
      setStatus('');
    }

    function setConsoleContext(consoleName) {
      const currentMeta = consoleMap.get(consoleName);
      currentAbbrev = currentMeta.abbrev;
      currentConsoleName = consoleName;

      githubLink.href = currentMeta.url;
      githubLink.textContent = currentMeta.url;

      currentReleaseUrl = `https://github.com/${GITHUB_USERNAME}/GameDB-${currentAbbrev}/releases/latest/download/${currentAbbrev}.data.tsv`;

      document.getElementById('downloadBtn').disabled = false;

      const fname = expectedFilenameForAbbrev(currentAbbrev);
      setStatus(`Click “Download & Load TSV”, then choose “${fname}” from your downloads.`, 'warn');
    }

    document.getElementById('consoleSelector').addEventListener('change', function () {
      // set things up
      const consoleName = this.value;
      sortState = { index: null, direction: null };

      // revert to initial state if empty selection
      if (!consoleName) {
        resetToInitialState();
        return;
      }

      setConsoleContext(consoleName);

      // If we've already loaded this console's TSV in this session, render immediately
      const cached = db.get(consoleName);
      if (cached) {
        setStatus(`Loaded from memory: ${cached.length - 1} rows.`, 'ok');
        renderTable(cached);
      } else {
        renderTable([]);
      }
    });

    // Download & Load button flow:
    // 1) Open the GitHub release asset in a new tab to download (no CORS issue for navigation/download)
    // 2) Prompt the user to select the downloaded file (browser security requirement)
    document.getElementById('downloadBtn').addEventListener('click', () => {
      if (!currentReleaseUrl || !currentConsoleName || !currentAbbrev) return;

      const fname = expectedFilenameForAbbrev(currentAbbrev);
      setStatus(`Downloading… when prompted, choose “${fname}” to load it.`, 'warn');

      // Trigger download/navigation
      window.open(currentReleaseUrl, '_blank', 'noopener');

      // Immediately prompt file selection
      document.getElementById('filePicker').click();
    });

    document.getElementById('filePicker').addEventListener('change', async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;

      try {
        // Basic sanity check: encourage the expected filename but don't require it
        if (currentAbbrev) {
          const expected = expectedFilenameForAbbrev(currentAbbrev);
          if (file.name !== expected) {
            setStatus(`Note: selected “${file.name}” (expected “${expected}”). Loading anyway…`, 'warn');
          } else {
            setStatus(`Loading “${file.name}”…`, 'warn');
          }
        } else {
          setStatus(`Loading “${file.name}”…`, 'warn');
        }

        const text = await file.text();
        const rows = text.trim().split('\n').map(r => r.split('\t'));

        // quick validation
        if (!rows.length || rows.length < 2) throw new Error('File appears empty or invalid.');
        if (!Array.isArray(rows[0]) || rows[0].length < 1) throw new Error('Header row missing.');

        // Cache + render
        db.set(currentConsoleName, rows);
        document.getElementById('searchBox').value = '';
        setStatus(`Loaded: ${rows.length - 1} rows.`, 'ok');
        renderTable(rows);
      } catch (err) {
        alert('Failed to load TSV file. Please try downloading again and selecting the .data.tsv file.');
        setStatus('Failed to load TSV file. Try again.', 'warn');
      } finally {
        // reset picker so choosing the same file again triggers change
        e.target.value = '';
      }
    });

    document.getElementById('modeToggle').addEventListener('click', function () {
      const body = document.body;
      body.classList.toggle('dark');
      this.textContent = body.classList.contains('dark') ? '☀️ Light Mode' : '🌙 Dark Mode';
    });

    loadMarkdown();
  </script>
</body>
</html>
