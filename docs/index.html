<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GameDB Viewer</title>
  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #000000;
      --table-bg: #f2f2f2;
      --border-color: #ddd;
      --input-bg: #ffffff;
      --muted-color: #666;
      --ok-color: #1a7f37;
      --warn-color: #b26a00;
    }

    body.dark {
      --bg-color: #1e1e1e;
      --text-color: #eeeeee;
      --table-bg: #333333;
      --border-color: #555555;
      --input-bg: #2a2a2a;
      --muted-color: #aaa;
      --ok-color: #3fb950;
      --warn-color: #d29922;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: Arial, sans-serif;
      padding: 20px;
      transition: background-color 0.3s, color 0.3s;
    }

    #controls {
      text-align: center;
      margin-bottom: 20px;
    }

    #headerRow {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    #modeToggle, #loadBtn {
      padding: 6px 10px;
      cursor: pointer;
      font-size: 14px;
    }

    #subtitleRow {
      margin-top: 6px;
    }

    #actionRow {
      margin-top: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    #statusRow {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted-color);
      min-height: 18px;
    }
    #statusRow.ok { color: var(--ok-color); }
    #statusRow.warn { color: var(--warn-color); }

    select, input {
      padding: 6px;
      background-color: var(--input-bg);
      color: var(--text-color);
      border: 1px solid var(--border-color);
    }

    #searchBox {
      margin-top: 10px;
      width: min(680px, 95vw);
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 10px;
      font-family: monospace;
    }

    th, td {
      border: 1px solid var(--border-color);
      padding: 8px;
      font-family: monospace;
    }

    th {
      cursor: pointer;
      background-color: var(--table-bg);
      user-select: none;
    }

    th.sorted-asc::after { content: " ▲"; }
    th.sorted-desc::after { content: " ▼"; }

    a:link {
      color: #0066cc;
      text-decoration: underline;
    }

    a:visited {
      color: #800080;
    }

    a:hover {
      color: #3399ff;
    }

    a:active {
      color: #ff6600;
    }

    #controls hr {
      border: none;
      border-top: 1px solid var(--border-color);
      margin: 14px auto 0 auto;
      max-width: 900px;
    }
  </style>
</head>
<body>
  <div id="controls">
    <div id="headerRow">
      <h1 style="margin: 0;">GameDB Viewer</h1>
      <button id="modeToggle">🌙 Dark Mode</button>
    </div>

    <div id="subtitleRow">
      <a id="githubLink" target="_blank" rel="noopener">Loading...</a>
    </div>

    <div id="actionRow">
      <button id="loadBtn" title="Load a previously-downloaded GameDB .data.tsv from your computer">
        Load GameDB <code>.data.tsv</code>
      </button>

      <select id="downloadSelector" title="Select a console to download its .data.tsv">
        <option value="">Select a console to download its data TSV</option>
      </select>
    </div>

    <div id="statusRow"></div>

    <input type="text" id="searchBox" placeholder="Search loaded table..." disabled>

    <hr>
  </div>

  <div id="tableContainer"></div>

  <!-- Hidden file picker (browser requires explicit user selection to read local files) -->
  <input id="filePicker" type="file" accept=".tsv,.data.tsv,text/tab-separated-values" style="display:none;">

  <script>
    const GITHUB_USERNAME = 'niemasd';
    const GAMEDB_URL = `https://github.com/${GITHUB_USERNAME}/GameDB`;

    const githubLink = document.getElementById('githubLink');
    githubLink.href = GAMEDB_URL;
    githubLink.textContent = GAMEDB_URL;

    const db = new Map();              // consoleName -> parsed rows
    const consoleMap = new Map();      // consoleName -> { url, abbrev }
    let sortState = { index: null, direction: null };
    let currentAbbrev = null;          // abbrev for currently loaded table
    let currentConsoleName = null;     // name for currently loaded table

    // parse query string
    const urlParams = new URLSearchParams(window.location.search);
    const preselectedAbbrev = urlParams.get('console'); // for convenience: ?console=64DD etc.

    function setStatus(msg, kind = '') {
      const el = document.getElementById('statusRow');
      el.classList.remove('ok', 'warn');
      if (kind) el.classList.add(kind);
      el.textContent = msg || '';
    }

    function expectedFilenameForAbbrev(abbrev) {
      return `${abbrev}.data.tsv`;
    }

    function clearTable() {
      document.getElementById('tableContainer').innerHTML = '';
      document.getElementById('searchBox').value = '';
      document.getElementById('searchBox').disabled = true;
      sortState = { index: null, direction: null };
      currentAbbrev = null;
      currentConsoleName = null;
      githubLink.href = GAMEDB_URL;
      githubLink.textContent = GAMEDB_URL;
    }

    async function loadMarkdown() {
      const readmeUrl = `https://raw.githubusercontent.com/${GITHUB_USERNAME}/GameDB/main/README.md`;
      const res = await fetch(readmeUrl);
      const md = await res.text();
      const lines = md.split('\n');
      const regex = new RegExp(`^\\* \\*\\*(.+?):\\*\\* https://github\\.com/${GITHUB_USERNAME}/GameDB-(\\w+)`);

      for (const line of lines) {
        const match = line.match(regex);
        if (match) {
          const consoleName = match[1];
          const abbrev = match[2];
          const url = `https://github.com/${GITHUB_USERNAME}/GameDB-${abbrev}`;
          consoleMap.set(consoleName, { url, abbrev });
          addDownloadOption(consoleName);
        }
      }

      // If ?console=ABBREV was provided, auto-start a download for that abbrev.
      // (This only downloads; loading still requires user to pick a file.)
      if (preselectedAbbrev) {
        const matchEntry = Array.from(consoleMap.entries()).find(
          ([, meta]) => meta.abbrev.toLowerCase() === preselectedAbbrev.toLowerCase()
        );
        if (matchEntry) {
          const consoleName = matchEntry[0];
          triggerDownload(consoleName);
        }
      }

      setStatus('Use “Load GameDB .data.tsv” to load a file, or pick a console to download its TSV.', '');
    }

    function addDownloadOption(consoleName) {
      const selector = document.getElementById('downloadSelector');
      const option = document.createElement('option');
      option.value = consoleName;
      option.textContent = consoleName;
      selector.appendChild(option);
    }

    function triggerDownload(consoleName) {
      const meta = consoleMap.get(consoleName);
      if (!meta) return;

      const abbrev = meta.abbrev;
      const releaseUrl = `https://github.com/${GITHUB_USERNAME}/GameDB-${abbrev}/releases/latest/download/${abbrev}.data.tsv`;
      const fname = expectedFilenameForAbbrev(abbrev);

      // Update status + open the download
      setStatus(`Downloading “${fname}”… When it finishes, click “Load GameDB .data.tsv” and select that file.`, 'warn');
      window.open(releaseUrl, '_blank', 'noopener');
    }

    function renderTable(data) {
      const container = document.getElementById('tableContainer');
      container.innerHTML = '';
      if (!data || !Array.isArray(data) || data.length === 0) return;

      const table = document.createElement('table');
      const thead = document.createElement('thead');
      const tbody = document.createElement('tbody');

      const headers = data[0];
      const idIndex = headers.indexOf('ID');

      const headerRow = document.createElement('tr');
      headers.forEach((header, idx) => {
        const th = document.createElement('th');
        th.textContent = header;

        th.addEventListener('click', () => {
          const isSameColumn = sortState.index === idx;
          const ascending = !isSameColumn || sortState.direction === 'desc';

          sortState = { index: idx, direction: ascending ? 'asc' : 'desc' };

          const sortedRows = data.slice(1).slice().sort((a, b) => {
            const aVal = a[idx] || '';
            const bVal = b[idx] || '';
            return ascending ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
          });

          renderTable([headers, ...sortedRows]);
        });

        headerRow.appendChild(th);
      });

      thead.appendChild(headerRow);
      table.appendChild(thead);

      const renderBody = (filteredData) => {
        tbody.innerHTML = '';
        filteredData.slice(1).forEach(row => {
          const tr = document.createElement('tr');
          row.forEach((cell, colIdx) => {
            const td = document.createElement('td');

            if (colIdx === idIndex && cell && currentAbbrev) {
              const a = document.createElement('a');
              a.href = `https://github.com/${GITHUB_USERNAME}/GameDB-${currentAbbrev}/tree/main/games/` + encodeURIComponent(`${cell}`);
              a.target = '_blank';
              a.rel = 'noopener';
              a.textContent = cell;
              td.appendChild(a);
            } else {
              td.textContent = cell;
            }

            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        });
      };

      renderBody(data);

      // Search
      const searchBox = document.getElementById('searchBox');
      searchBox.disabled = false;
      searchBox.oninput = function () {
        const query = this.value.toLowerCase();
        const filtered = [data[0], ...data.slice(1).filter(row =>
          row.some(cell => (cell || '').toLowerCase().includes(query))
        )];
        renderBody(filtered);
      };

      table.appendChild(tbody);
      container.appendChild(table);

      // Sort indicator
      thead.querySelectorAll('th').forEach((th, i) => {
        th.classList.remove('sorted-asc', 'sorted-desc');
        if (sortState.index === i) {
          th.classList.add(sortState.direction === 'asc' ? 'sorted-asc' : 'sorted-desc');
        }
      });

      // Sort by first column automatically on first render
      if (sortState.index === null) {
        table.querySelectorAll('th')[0].click();
      }
    }

    // Load button -> file picker (loads file into memory and renders)
    document.getElementById('loadBtn').addEventListener('click', () => {
      document.getElementById('filePicker').click();
    });

    document.getElementById('filePicker').addEventListener('change', async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;

      try {
        setStatus(`Loading “${file.name}”…`, 'warn');

        const text = await file.text();
        const rows = text.trim().split('\n').map(r => r.split('\t'));

        if (!rows.length || rows.length < 2) throw new Error('File appears empty or invalid.');

        // Try to infer abbrev from filename like "64DD.data.tsv"
        const m = file.name.match(/^([A-Za-z0-9_]+)\.data\.tsv$/);
        const inferredAbbrev = m ? m[1] : null;

        // Map inferred abbrev to console name (if possible)
        let inferredConsoleName = null;
        if (inferredAbbrev) {
          const entry = Array.from(consoleMap.entries()).find(([, meta]) => meta.abbrev === inferredAbbrev);
          if (entry) inferredConsoleName = entry[0];
        }

        currentAbbrev = inferredAbbrev || null;
        currentConsoleName = inferredConsoleName || null;

        // Update GitHub link: to console repo if we inferred it, else main repo
        if (currentConsoleName && consoleMap.has(currentConsoleName)) {
          const meta = consoleMap.get(currentConsoleName);
          githubLink.href = meta.url;
          githubLink.textContent = meta.url;
          db.set(currentConsoleName, rows);
        } else {
          githubLink.href = GAMEDB_URL;
          githubLink.textContent = GAMEDB_URL;
        }

        document.getElementById('searchBox').value = '';
        sortState = { index: null, direction: null };

        const label = inferredAbbrev ? ` (${inferredAbbrev})` : '';
        setStatus(`Loaded: ${rows.length - 1} rows${label}.`, 'ok');
        renderTable(rows);
      } catch (err) {
        alert('Failed to load TSV file. Please select a valid GameDB .data.tsv file.');
        setStatus('Failed to load TSV file.', 'warn');
      } finally {
        // reset picker so choosing the same file again triggers change
        e.target.value = '';
      }
    });

    // Download dropdown: selecting a console immediately starts a download (no proxy).
    document.getElementById('downloadSelector').addEventListener('change', function () {
      const consoleName = this.value;
      if (!consoleName) return;

      triggerDownload(consoleName);

      // Reset to default prompt so it feels like an action menu, not a "selected state"
      this.value = '';
    });

    document.getElementById('modeToggle').addEventListener('click', function () {
      const body = document.body;
      body.classList.toggle('dark');
      this.textContent = body.classList.contains('dark') ? '☀️ Light Mode' : '🌙 Dark Mode';
    });

    // Initial state
    clearTable();
    loadMarkdown();
  </script>
</body>
</html>
